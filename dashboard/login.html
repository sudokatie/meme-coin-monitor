<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Meme Coin Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #1a1b26;
            --bg-elevated: #24283b;
            --bg-highlight: #292e42;
            --border: #414868;
            --text: #c0caf5;
            --text-muted: #565f89;
            --accent: #7aa2f7;
            --purple: #bb9af7;
            --danger: #f7768e;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-container {
            background: var(--bg-elevated);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }
        
        .login-header h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }
        
        .login-header h1 span {
            color: var(--purple);
        }
        
        .login-header p {
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
        }
        
        .form-group input {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 15px;
            color: var(--text);
            font-family: inherit;
            transition: border-color 0.2s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .form-group input::placeholder {
            color: var(--text-muted);
        }
        
        .login-btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 10px;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            margin-top: 8px;
            transition: background 0.2s ease, transform 0.1s ease;
        }
        
        .login-btn:hover {
            background: #89b4fa;
        }
        
        .login-btn:active {
            transform: scale(0.98);
        }
        
        .login-btn:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: rgba(247, 118, 142, 0.15);
            color: var(--danger);
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        
        .error-message.visible {
            display: block;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 36px 28px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Meme Coin <span>Monitor</span></h1>
            <p>Enter your credentials to continue</p>
        </div>
        
        <div id="error-message" class="error-message"></div>
        
        <form class="login-form" id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            
            <button type="submit" class="login-btn" id="login-btn">Sign In</button>
        </form>
    </div>
    
    <script>
        const pathParts = window.location.pathname.split('/');
        if (pathParts[pathParts.length - 1] === 'login' || pathParts[pathParts.length - 1] === '') {
            pathParts.pop();
        }
        const BASE_PATH = pathParts.join('/') || '';
        const API_BASE = window.location.origin + BASE_PATH;
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const loginBtn = document.getElementById('login-btn');
            
            errorDiv.classList.remove('visible');
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.data?.success) {
                    window.location.href = BASE_PATH + '/dashboard/';
                } else {
                    errorDiv.textContent = data.detail || 'Invalid credentials';
                    errorDiv.classList.add('visible');
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.classList.add('visible');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });
        
        async function checkSession() {
            try {
                const response = await fetch(`${API_BASE}/auth/session`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.data?.authenticated) {
                    window.location.href = BASE_PATH + '/dashboard/';
                }
            } catch (error) {}
        }
        
        checkSession();
    </script>
</body>
</html>
